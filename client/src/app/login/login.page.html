<header class="navbar bg-base-100 shadow-sm">
  <div class="navbar-center mx-auto w-full max-w-3xl justify-start px-4">
    <h1 class="text-lg font-semibold">Login</h1>
  </div>
</header>

<section class="mx-auto flex w-full max-w-md flex-col gap-6 px-4 py-8">
  <div class="card bg-base-100 shadow-sm">
    <div class="card-body gap-5">
      <label class="form-control w-full gap-2">
        <span class="label-text">Username</span>
        <input
          autocomplete="username webauthn"
          class="input w-full"
          name="username"
          placeholder="Tap here to show passkeys in autofill"
          type="text"
        />
      </label>

      <button (click)="signIn()" class="btn btn-primary btn-block" type="button">
        Sign in with passkey
      </button>

      @if (conditionalMediationAvailable()) {
        <p class="text-center text-sm text-base-content/70">
          Click in the username field to trigger passkey autofill.
        </p>
      }

      <a class="btn btn-block" routerLink="/registration">Registration</a>
    </div>
  </div>
</section>
